<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Complaints</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

img{
width:60px;
border-radius:6px;
}

textarea{
width:100%;
padding:6px;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.reply{background:#004aad;color:white;}
.solve{background:green;color:white;}
.delete{background:red;color:white;}

</style>

</head>

<body>

<header>Complaint Management</header>

<div class="container">

<table>

<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Class</th>
<th>Subject</th>
<th>Message</th>
<th>Photo</th>
<th>Reply</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,getDocs,doc,updateDoc,deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain: "nmpsnagguradiya-b9b94.firebaseapp.com",
projectId: "nmpsnagguradiya-b9b94",
storageBucket: "nmpsnagguradiya-b9b94.firebasestorage.app",
messagingSenderId: "811957568318",
appId: "1:811957568318:web:7058de9ba52df9d6bae26f"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

loadComplaints();

async function loadComplaints(){

const snapshot=await getDocs(collection(db,"complaints"));

const table=document.getElementById("list");

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const id=docSnap.id;

table.innerHTML+=`

<tr>

<td>${data.name}</td>

<td>${data.mobile}</td>

<td>${data.class}</td>

<td>${data.subject}</td>

<td>${data.message}</td>

<td>
${data.photo ? `<img src="${data.photo}">` : "-"}
</td>

<td>
<textarea id="reply_${id}" placeholder="Write reply"></textarea>
</td>

<td id="status_${id}">
${data.status || "Pending"}
</td>

<td>

<button class="reply" onclick="sendReply('${id}')">
Reply
</button>

<button class="solve" onclick="markSolved('${id}')">
Solved
</button>

<button class="delete" onclick="deleteComplaint('${id}')">
Delete
</button>

</td>

</tr>

`;

});

}

window.sendReply=async function(id){

const reply=document.getElementById("reply_"+id).value;

await updateDoc(doc(db,"complaints",id),{

reply:reply

});

alert("Reply saved");

}

window.markSolved=async function(id){

await updateDoc(doc(db,"complaints",id),{

status:"Solved"

});

document.getElementById("status_"+id).innerText="Solved";

}

window.deleteComplaint=async function(id){

if(confirm("Delete complaint?")){

await deleteDoc(doc(db,"complaints",id));

location.reload();

}

}

</script>

</body>
</html>
