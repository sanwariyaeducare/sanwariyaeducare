<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Student Fees Portal</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:6px;
margin-top:20px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#004aad;
color:white;
border:none;
cursor:pointer;
}

.actions button{
width:32%;
margin-right:1%;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#004aad;
color:white;
}

</style>

</head>

<body>

<header>Student Fees Portal</header>

<div class="container">

<div class="card">

<h3>Enter Student Details</h3>

<input type="text" id="mobile" placeholder="Mobile Number">

<input type="text" id="sssm" placeholder="SSSM ID">

<button onclick="checkFees()">Check Fees</button>

</div>

<div class="card" id="result" style="display:none">

<h3>Student Fees Details</h3>

<p><b>Name :</b> <span id="name"></span></p>
<p><b>Father :</b> <span id="father"></span></p>
<p><b>Mother :</b> <span id="mother"></span></p>
<p><b>Village :</b> <span id="village"></span></p>
<p><b>Mobile :</b> <span id="mobile2"></span></p>
<p><b>Roll Number :</b> <span id="roll"></span></p>

<p><b>Total Fees :</b> ₹ <span id="total"></span></p>
<p><b>Paid :</b> ₹ <span id="paid"></span></p>
<p><b>Pending :</b> ₹ <span id="pending"></span></p>

<div class="actions">

<button onclick="downloadReceipt()">Receipt PDF</button>
<button onclick="sendWhatsApp()">WhatsApp</button>
<button onclick="downloadExamCard()">Exam Card</button>

</div>

<h3>Fees History</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let studentData=null;
let studentId=null;
let history=[];

window.checkFees=async function(){

let mobile=document.getElementById("mobile").value;
let sssm=document.getElementById("sssm").value;

const q=query(
collection(db,"admissions"),
where("mobile","==",mobile),
where("sssm","==",sssm)
);

const snap=await getDocs(q);

if(snap.empty){
alert("Student Not Found");
return;
}

let docSnap=snap.docs[0];
studentData=docSnap.data();
studentId=docSnap.id;

let fees=studentData.fees||0;
let vehicle=studentData.vehicleFees||0;
let paid=studentData.paid||0;

let total=fees+vehicle;
let pending=total-paid;

document.getElementById("result").style.display="block";

document.getElementById("name").innerText=studentData.name;
document.getElementById("father").innerText=studentData.father;
document.getElementById("mother").innerText=studentData.mother||"";
document.getElementById("village").innerText=studentData.village;
document.getElementById("mobile2").innerText=studentData.mobile;
document.getElementById("roll").innerText=studentData.roll;

document.getElementById("total").innerText=total;
document.getElementById("paid").innerText=paid;
document.getElementById("pending").innerText=pending;

/* HISTORY */

const hq=query(
collection(db,"fees_history"),
where("studentId","==",studentId)
);

const hsnap=await getDocs(hq);

let html="";
history=[];

hsnap.forEach(d=>{

let h=d.data();
history.push(h);

html+=`
<tr>
<td>${h.date}</td>
<td>₹ ${h.amount}</td>
</tr>
`;

});

document.getElementById("history").innerHTML=html;

}

/* RECEIPT */

window.downloadReceipt=function(){

const { jsPDF }=window.jspdf;

let pdf=new jsPDF();

pdf.text("School Fees Receipt",20,20);

pdf.text("Name : "+studentData.name,20,40);
pdf.text("Father : "+studentData.father,20,50);
pdf.text("Village : "+studentData.village,20,60);
pdf.text("Mobile : "+studentData.mobile,20,70);

let fees=studentData.fees||0;
let vehicle=studentData.vehicleFees||0;
let paid=studentData.paid||0;

let total=fees+vehicle;
let pending=total-paid;

pdf.text("Total Fees : "+total,20,90);
pdf.text("Paid : "+paid,20,100);
pdf.text("Pending : "+pending,20,110);

pdf.save("fees_receipt.pdf");

}

/* WHATSAPP */

window.sendWhatsApp=function(){

let phone=studentData.mobile.replace(/\D/g,'');

let msg=
"Fees Receipt%0A"+
"Student : "+studentData.name+"%0A"+
"Paid : ₹"+(studentData.paid||0);

window.open("https://wa.me/91"+phone+"?text="+msg);

}

/* EXAM CARD */

window.downloadExamCard=function(){

let fees=studentData.fees||0;
let vehicle=studentData.vehicleFees||0;
let paid=studentData.paid||0;

let total=fees+vehicle;

if(paid < total*0.5){

alert("आपकी 50% से कम फीस जमा है\nExam Card Download नहीं कर सकते");

return;

}

const { jsPDF }=window.jspdf;

let pdf=new jsPDF({
orientation:"landscape",
unit:"mm",
format:[85,54]
});

/* BORDER */

pdf.setDrawColor(0,0,0);
pdf.rect(1,1,83,52);

/* BLUE HEADER */

pdf.setFillColor(0,74,173);
pdf.rect(1,1,83,16,"F");

pdf.setTextColor(255,255,255);
pdf.setFontSize(10);
pdf.setFont(undefined,"bold");

pdf.text("YOUR SCHOOL NAME",42,8,{align:"center"});
pdf.text("Village Nag Guradiya",42,13,{align:"center"});

/* YELLOW BODY */

pdf.setFillColor(255,204,0);
pdf.rect(1,17,83,36,"F");

/* PHOTO */

if(studentData.photo){

pdf.addImage(studentData.photo,"JPEG",4,20,18,22);

}

/* TEXT */

pdf.setTextColor(0,0,0);
pdf.setFontSize(8);
pdf.setFont(undefined,"bold");

pdf.text("Name :",25,24);
pdf.text(studentData.name||"",40,24);

pdf.text("Roll No :",25,30);
pdf.text(studentData.roll||"",40,30);

pdf.text("Father :",25,36);
pdf.text(studentData.father||"",40,36);

pdf.text("Village :",25,42);
pdf.text(studentData.village||"",40,42);

pdf.text("Mobile :",25,48);
pdf.text(studentData.mobile||"",40,48);

pdf.save("exam_card.pdf");

}

</script>

</body>

</html>
