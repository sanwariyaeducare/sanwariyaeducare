<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admission Print</title>

<style>

body{
font-family:Arial;
background:#eee;
margin:0;
padding:10px;
}

.controls{
text-align:center;
margin-bottom:10px;
}

button,select{
padding:8px;
margin:4px;
cursor:pointer;
font-size:16px;
}

.form{
width:190mm;
margin:auto;
background:white;
padding:12px;
border:2px solid #004aad;
position:relative;
box-sizing:border-box;
}

.header{
text-align:center;
border-bottom:1px solid #000;
padding-bottom:6px;
margin-bottom:10px;
}

.school{
font-size:26px;
font-weight:bold;
}

.logo{
position:absolute;
left:10px;
top:10px;
}

.logo img{
width:60px;
}

.photo{
position:absolute;
right:20px;
top:110px;
}

.photo img{
width:90px;
height:110px;
border:1px solid #000;
object-fit:cover;
}

.qr{
position:absolute;
right:20px;
bottom:80px;
}

.qr canvas{
width:60px !important;
height:60px !important;
}

table{
width:100%;
border-collapse:collapse;
}

table td{
border:1px solid #000;
padding:6px;
font-size:18px;
}

.label{
font-weight:bold;
width:35%;
}

.signature{
display:flex;
justify-content:space-between;
margin-top:25px;
font-size:18px;
}

/* THEMES */

.blue{
border-color:#004aad;
}

.blue .header{
color:#004aad;
}

.green{
border-color:#2e7d32;
}

.green .header{
color:#2e7d32;
}

.maroon{
border-color:#800000;
}

.maroon .header{
color:#800000;
}

@media print{

.controls{
display:none;
}

body{
background:white;
padding:0;
}

.form{
width:100%;
border:none;
}

}

</style>

</head>

<body>

<div class="controls">

<select id="themeSelect">
<option value="blue">Blue Theme</option>
<option value="green">Green Theme</option>
<option value="maroon">Maroon Theme</option>
</select>

<button onclick="window.print()">Print</button>

</div>

<div class="form blue" id="form">

<div class="logo">
<img id="schoolLogo">
</div>

<div class="header">

<div class="school" id="schoolName"></div>

<div id="schoolAddress"></div>

DISE Code : <span id="schoolDise"></span> |
Session : <span id="schoolSession"></span>

<h2>Student Admission Form</h2>

Student ID : <span id="studentID"></span>

</div>

<div class="photo">
<img id="photo">
</div>

<div class="qr">
<canvas id="qr"></canvas>
</div>

<table>

<tr><td class="label">Student Name</td><td id="name"></td></tr>
<tr><td class="label">Father Name</td><td id="father"></td></tr>
<tr><td class="label">Mother Name</td><td id="mother"></td></tr>
<tr><td class="label">Mobile</td><td id="mobile"></td></tr>
<tr><td class="label">Class</td><td id="class"></td></tr>
<tr><td class="label">Date of Birth</td><td id="dob"></td></tr>
<tr><td class="label">Admission Date</td><td id="admissionDate"></td></tr>
<tr><td class="label">Village</td><td id="village"></td></tr>
<tr><td class="label">City</td><td id="city"></td></tr>
<tr><td class="label">Post</td><td id="post"></td></tr>
<tr><td class="label">District</td><td id="district"></td></tr>
<tr><td class="label">State</td><td id="state"></td></tr>
<tr><td class="label">Aadhar</td><td id="adhar"></td></tr>
<tr><td class="label">APAR ID</td><td id="apar"></td></tr>
<tr><td class="label">SSSM ID</td><td id="sssm"></td></tr>
<tr><td class="label">Family ID</td><td id="family"></td></tr>
<tr><td class="label">Roll Number</td><td id="roll"></td></tr>
<tr><td class="label">Scholar Number</td><td id="scholer"></td></tr>
<tr><td class="label">Caste</td><td id="caste"></td></tr>
<tr><td class="label">Category</td><td id="category"></td></tr>

</table>

<div class="signature">

<div>Parent Signature</div>
<div>Principal Signature</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,doc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBj8_SjhJ9QtXu-4DigToqjBos5waZEXYw",
authDomain:"nmpsnagguradiya-b9b94.firebaseapp.com",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";
const session=localStorage.getItem("activeSession")||"2025-26";

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

async function loadSchool(){

const snap=await getDoc(doc(db,"schools",schoolId));

if(snap.exists()){

const s=snap.data();

document.getElementById("schoolName").innerText=s.name||"";
document.getElementById("schoolAddress").innerText=s.address||"";
document.getElementById("schoolDise").innerText=s.dise||"";
document.getElementById("schoolSession").innerText=session;

document.getElementById("schoolLogo").src=s.logo||"";

}

}

async function loadStudent(){

const ref=doc(db,"admissions",id);
const snap=await getDoc(ref);

if(snap.exists()){

const s=snap.data();

document.getElementById("studentID").innerText=id;

document.getElementById("name").innerText=s.name||"";
document.getElementById("father").innerText=s.father||"";
document.getElementById("mother").innerText=s.mother||"";
document.getElementById("mobile").innerText=s.mobile||"";
document.getElementById("class").innerText=s.class||"";
document.getElementById("dob").innerText=s.dob||"";
document.getElementById("admissionDate").innerText=s.admissionDate||"";
document.getElementById("village").innerText=s.village||"";
document.getElementById("city").innerText=s.city||"";
document.getElementById("post").innerText=s.post||"";
document.getElementById("district").innerText=s.district||"";
document.getElementById("state").innerText=s.state||"";
document.getElementById("adhar").innerText=s.adhar||"";
document.getElementById("apar").innerText=s.apar||"";
document.getElementById("sssm").innerText=s.sssm||"";
document.getElementById("family").innerText=s.family||"";
document.getElementById("roll").innerText=s.roll||"";
document.getElementById("scholer").innerText=s.scholer||"";
document.getElementById("caste").innerText=s.caste||"";
document.getElementById("category").innerText=s.category||"";

document.getElementById("photo").src=s.photo||"";

QRCode.toCanvas(document.getElementById("qr"),window.location.href);

}

}

document.getElementById("themeSelect").addEventListener("change",function(){

const form=document.getElementById("form");

form.classList.remove("blue","green","maroon");

form.classList.add(this.value);

});

loadSchool();
loadStudent();

</script>

</body>
                                  </html>
