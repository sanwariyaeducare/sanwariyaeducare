<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Transfer Certificate</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
.container{max-width:900px;margin:auto;padding:20px;}

.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}

input,select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.tc{
width:210mm;
min-height:297mm;
background:white;
padding:20px;
border:2px solid #000;
margin:auto;
}

.header{text-align:center;border-bottom:2px solid #000;margin-bottom:10px;}
.header img{width:60px;}

.title{text-align:center;font-size:22px;font-weight:bold;margin:10px 0;}

.row{margin:5px 0;font-size:14px;}

.sign{
display:flex;
justify-content:space-between;
margin-top:40px;
}

.line{
border-top:1px solid #000;
width:150px;
margin-top:30px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<input type="text" id="search" placeholder="Search Student">

<select id="studentSelect"></select>

<button onclick="loadTC()">Load TC</button>
<button onclick="issueTC()">Issue TC</button>
<button onclick="restoreTC()">Restore</button>
<button onclick="window.print()">Print</button>

</div>

<div id="tcArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"...",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";
const session=localStorage.getItem("activeSession")||"2025-26";

let students=[];
let allStudents=[]; // 🔥 IMPORTANT (restore ke liye)
let schoolData={};

async function loadAll(){

// school
const s=await getDoc(doc(db,"schools",schoolId));
if(s.exists()) schoolData=s.data();

// students
const snap=await getDocs(collection(db,"admissions"));

students=[];
allStudents=[];

snap.forEach(d=>{
let data=d.data();
if(data.schoolId!==schoolId) return;
if(data.session!==session) return;

allStudents.push({id:d.id,...data});

if(!data.tcIssued){
students.push({id:d.id,...data});
}
});

renderDropdown();
}

function renderDropdown(){

let html='<option value="">Select Student</option>';

allStudents.forEach(s=>{
html+=`<option value="${s.id}">${s.name} (${s.class}) ${s.tcIssued?"[TC]":""}</option>`;
});

studentSelect.innerHTML=html;
}

// 🔍 SEARCH
search.addEventListener("keyup",function(){
let val=this.value.toLowerCase();

let html='<option value="">Select Student</option>';

allStudents.forEach(s=>{
if(s.name.toLowerCase().includes(val)){
html+=`<option value="${s.id}">${s.name}</option>`;
}
});

studentSelect.innerHTML=html;
});

// ✅ LOAD TC
window.loadTC=async function(){

const id=studentSelect.value;
if(!id) return alert("Select student");

const st=allStudents.find(x=>x.id===id);

// 🔥 attendance auto
let att=await getDoc(doc(db,"attendance",`${id}_${session}`));
let work=0,present=0;

if(att.exists()){
work=att.data().work||0;
present=att.data().present||0;
}

const today=new Date().toLocaleDateString();
const tcNo="TC-"+Date.now();

let html=`

<div class="tc">

<div class="header">
<img src="${schoolData.logo}">
<h2>${schoolData.name}</h2>
<div>${schoolData.address}</div>
<div>DISE : ${schoolData.dise}</div>
</div>

<div class="title">School Leaving Certificate / स्थानांतरण प्रमाण पत्र</div>

<div class="row"><b>TC No :</b> ${tcNo}</div>
<div class="row"><b>Date of Issue :</b> ${today}</div>

<div class="row"><b>Name :</b> ${st.name}</div>
<div class="row"><b>Father :</b> ${st.father}</div>
<div class="row"><b>Mother :</b> ${st.mother}</div>

<div class="row"><b>Scholar No :</b> ${st.scholer}</div>

<div class="row"><b>Nationality :</b> ${st.national}</div>
<div class="row"><b>Caste :</b> ${st.caste}</div>
<div class="row"><b>Category :</b> ${st.category}</div>

<div class="row"><b>DOB :</b> ${st.dob}</div>

<div class="row"><b>Date of First Admission :</b> ${st.admissionDate} (Class ${st.class})</div>

<div class="row"><b>Class :</b> ${st.class}</div>

<div class="row"><b>Dues Paid :</b> YES</div>
<div class="row"><b>Fee Concession :</b> NO</div>

<div class="row"><b>Total Working Days :</b> ${work}</div>
<div class="row"><b>Present Days :</b> ${present}</div>

<div class="row"><b>Reason :</b> Parent Request</div>

<div class="sign">

<div>
<div class="line"></div>
Class Teacher
</div>

<div>
<div class="line"></div>
Clerk
</div>

<div>
<div class="line"></div>
Principal
</div>

</div>

</div>
`;

tcArea.innerHTML=html;

}

// ✅ ISSUE TC
window.issueTC=async function(){

const id=studentSelect.value;
if(!id) return alert("Select student");

await updateDoc(doc(db,"admissions",id),{
tcIssued:true,
tcDate:new Date().toLocaleDateString()
});

alert("TC Issued ✅");
loadAll();
}

// ✅ RESTORE
window.restoreTC=async function(){

const id=studentSelect.value;
if(!id) return alert("Select student");

await updateDoc(doc(db,"admissions",id),{
tcIssued:false
});

alert("Restored ✅");
loadAll();
}

loadAll();

</script>

</body>
</html>
