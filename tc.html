<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Transfer Certificate</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
.container{max-width:900px;margin:auto;padding:20px;}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select,button{
padding:10px;
margin:5px;
}

button{
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.tc{
width:210mm;
min-height:297mm;
background:white;
padding:20px;
border:2px solid #000;
margin:auto;
}

.header{
text-align:center;
border-bottom:2px solid #000;
margin-bottom:10px;
}

.header img{width:60px;}

.title{
text-align:center;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.row{
margin:5px 0;
font-size:14px;
}

.sign{
display:flex;
justify-content:space-between;
margin-top:40px;
}

.line{
border-top:1px solid #000;
width:150px;
margin-top:30px;
text-align:center;
}

.hide{display:none;}
</style>

</head>

<body>

<div class="container">

<div class="card">

<input type="text" id="search" placeholder="Search Student Name">

<select id="studentSelect"></select>

<button onclick="loadTC()">Load TC</button>
<button onclick="issueTC()">Issue TC</button>
<button onclick="restoreTC()">Restore Student</button>
<button onclick="window.print()">Print</button>

</div>

<div id="tcArea"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"...",
projectId:"nmpsnagguradiya-b9b94"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const schoolId=localStorage.getItem("schoolId")||"school_001";
const session=localStorage.getItem("activeSession")||"2025-26";

let students=[];
let schoolData={};

async function loadAll(){

// school
const s=await getDoc(doc(db,"schools",schoolId));
if(s.exists()) schoolData=s.data();

// students
const snap=await getDocs(collection(db,"admissions"));

students=[];
snap.forEach(d=>{
let data=d.data();
if(data.schoolId!==schoolId) return;
if(data.session!==session) return;

// hide TC issued students
if(data.tcIssued) return;

students.push({id:d.id,...data});
});

renderDropdown();
}

function renderDropdown(){

let html='<option value="">Select Student</option>';

students.forEach(s=>{
html+=`<option value="${s.id}">${s.name} (${s.class})</option>`;
});

document.getElementById("studentSelect").innerHTML=html;
}

// SEARCH
document.getElementById("search").addEventListener("keyup",function(){

let val=this.value.toLowerCase();

let html='<option value="">Select Student</option>';

students.forEach(s=>{
if(s.name.toLowerCase().includes(val)){
html+=`<option value="${s.id}">${s.name}</option>`;
}
});

studentSelect.innerHTML=html;

});

// TC LOAD
window.loadTC=async function(){

const id=studentSelect.value;
if(!id) return alert("Select student");

const st=students.find(x=>x.id===id);

let tcNo="TC-"+Date.now();

let html=`

<div class="tc">

<div class="header">
<img src="${schoolData.logo}">
<h2>${schoolData.name}</h2>
<div>${schoolData.address}</div>
<div>DISE : ${schoolData.dise}</div>
</div>

<div class="title">School Leaving Certificate / स्थानांतरण प्रमाण पत्र</div>

<div class="row">TC No : ${tcNo}</div>
<div class="row">Name : ${st.name}</div>
<div class="row">Father Name : ${st.father}</div>
<div class="row">Mother Name : ${st.mother}</div>

<div class="row">Scholar No : ${st.scholer}</div>

<div class="row">Nationality : ${st.national}</div>
<div class="row">Caste : ${st.caste}</div>
<div class="row">Category : ${st.category}</div>

<div class="row">Date of Birth : ${st.dob}</div>

<div class="row">Date of First Admission : ${st.admissionDate} (Class ${st.class})</div>

<div class="row">Class in which studying : ${st.class}</div>

<div class="row">Whether dues paid : YES</div>
<div class="row">Fee concession : NO</div>

<div class="row">Total Working Days : 220</div>
<div class="row">Present Days : 200</div>

<div class="row">Reason for leaving : Parent request</div>

<div class="row">Date of Issue : ${new Date().toLocaleDateString()}</div>

<div class="sign">
<div>
<div class="line"></div>
Class Teacher
</div>

<div>
<div class="line"></div>
Principal
</div>
</div>

</div>
`;

document.getElementById("tcArea").innerHTML=html;

}

// ISSUE TC
window.issueTC=async function(){

const id=studentSelect.value;
if(!id) return alert("Select student");

await updateDoc(doc(db,"admissions",id),{
tcIssued:true
});

alert("TC Issued ✅");
loadAll();

}

// RESTORE
window.restoreTC=async function(){

const id=studentSelect.value;
if(!id) return alert("Select student");

await updateDoc(doc(db,"admissions",id),{
tcIssued:false
});

alert("Student Restored ✅");
loadAll();

}

loadAll();

</script>

</body>
</html>
